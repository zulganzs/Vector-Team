# Mosquitto MQTT Broker configuration for BlazeWatch

# Listener settings
listener 1883
protocol mqtt

# Authentication — disable anonymous access for MVP/demo
# For production: set allow_anonymous false and configure:
#   password_file /mosquitto/config/passwd
allow_anonymous true

# Logging
log_dest stdout
log_type all

# Persistence
persistence true
persistence_location /mosquitto/data/
