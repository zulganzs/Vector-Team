version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - socketio
    networks:
      - blazewatch_net
    restart: unless-stopped

  app:
    build:
      context: .
      target: production
    command: node dist/server.js
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/blazewatch.sqlite
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - redis
      - mosquitto
    networks:
      - blazewatch_net
    restart: unless-stopped

  socketio:
    build:
      context: .
      target: production
    command: node dist/websocket-server.js
    environment:
      - NODE_ENV=production
      - SOCKETIO_PORT=8080
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - blazewatch_net
    restart: unless-stopped

  worker:
    build:
      context: .
      target: production
    command: node dist/queue-worker.js
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - blazewatch_net
    restart: unless-stopped

  sensor-listener:
    build:
      context: .
      target: production
    command: node dist/mqtt-subscriber.js
    env_file:
      - .env
    depends_on:
      - mosquitto
      - app
    networks:
      - blazewatch_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blazewatch_net
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - blazewatch_net
    restart: unless-stopped

networks:
  blazewatch_net:
    driver: bridge

volumes:
  sqlite_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
